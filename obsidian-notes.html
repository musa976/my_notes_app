<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Notes</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-void: #0d0d0f;
    --bg-base: #111114;
    --bg-surface: #18181c;
    --bg-elevated: #202026;
    --bg-hover: #28282f;
    --bg-active: #2e2e38;
    --border: #2a2a35;
    --border-bright: #3d3d50;
    --accent: #7c6af7;
    --accent-glow: #9b8bff;
    --accent-dim: #4a3fa0;
    --accent-bg: rgba(124,106,247,0.08);
    --accent-bg-hover: rgba(124,106,247,0.15);
    --text-primary: #e8e6f0;
    --text-secondary: #8b88a0;
    --text-muted: #4e4c60;
    --text-accent: #a99aff;
    --tag-green: #3d7a5e;
    --tag-green-text: #7ecba8;
    --tag-blue: #2a5a8a;
    --tag-blue-text: #7ab8f5;
    --tag-amber: #7a5a2a;
    --tag-amber-text: #f5c87a;
    --danger: #c24040;
    --danger-hover: #e05050;
    --font-mono: 'JetBrains Mono', monospace;
    --font-serif: 'Crimson Pro', Georgia, serif;
    --radius: 6px;
    --radius-lg: 10px;
    --sidebar-w: 280px;
  }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-base);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }

  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .logo-gem {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .app-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-accent);
    letter-spacing: 0.5px;
  }

  .app-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
  }

  #searchInput {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 10px 7px 32px;
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus { border-color: var(--accent-dim); }
  #searchInput::placeholder { color: var(--text-muted); }

  .sidebar-actions {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .btn-new {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-dim);
    border-radius: var(--radius);
    color: var(--text-accent);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-new:hover {
    background: var(--accent-bg-hover);
    border-color: var(--accent);
  }

  .btn-new svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .notes-list::-webkit-scrollbar { width: 4px; }
  .notes-list::-webkit-scrollbar-track { background: transparent; }
  .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .note-item {
    padding: 10px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }

  .note-item:hover { background: var(--bg-hover); }
  .note-item.active { background: var(--bg-active); border-left-color: var(--accent); }

  .note-item-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .note-item.active .note-item-title { color: var(--text-accent); }

  .note-item-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .note-item-date {
    font-size: 10px;
    color: var(--text-muted);
  }

  .note-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }

  .tag-ideas { background: rgba(61,122,94,0.25); color: var(--tag-green-text); }
  .tag-work { background: rgba(42,90,138,0.25); color: var(--tag-blue-text); }
  .tag-personal { background: rgba(122,90,42,0.25); color: var(--tag-amber-text); }

  .note-item-preview {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 3px;
    font-family: var(--font-serif);
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.8;
  }

  .empty-state svg {
    width: 40px; height: 40px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 1;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .note-count {
    padding: 8px 14px 4px;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* MAIN EDITOR */
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-base);
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-base);
    gap: 12px;
  }

  .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; }
  .toolbar-right { display: flex; align-items: center; gap: 6px; }

  .toolbar-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .toolbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-bright); }
  .toolbar-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

  .toolbar-btn.danger:hover { background: rgba(194,64,64,0.15); border-color: var(--danger); color: var(--danger); }
  .toolbar-btn.save { background: var(--accent-bg); border-color: var(--accent-dim); color: var(--text-accent); }
  .toolbar-btn.save:hover { background: var(--accent-bg-hover); border-color: var(--accent); }

  .tag-select {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
    outline: none;
    transition: all 0.15s;
  }

  .tag-select:hover { border-color: var(--border-bright); }

  .word-count {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 6px;
    border-left: 1px solid var(--border);
    margin-left: 2px;
  }

  /* TITLE INPUT */
  .title-area {
    padding: 32px 48px 16px;
    border-bottom: 1px solid var(--border);
  }

  #noteTitle {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    line-height: 1.3;
  }

  #noteTitle::placeholder { color: var(--text-muted); font-style: italic; }

  .title-underline {
    height: 1px;
    background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 80%);
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #noteTitle:focus ~ .title-underline { opacity: 1; }

  /* EDITOR BODY */
  .editor-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 48px 40px;
  }

  .editor-body::-webkit-scrollbar { width: 5px; }
  .editor-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #noteContent {
    width: 100%;
    min-height: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.9;
    resize: none;
    white-space: pre-wrap;
  }

  #noteContent::placeholder { color: var(--text-muted); font-style: italic; }

  /* WELCOME SCREEN */
  .welcome-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--text-muted);
    background: var(--bg-base);
  }

  .welcome-screen svg {
    width: 64px; height: 64px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 0.8;
    opacity: 0.35;
  }

  .welcome-title { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
  .welcome-sub { font-size: 12px; color: var(--text-muted); line-height: 1.7; text-align: center; }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 1000;
  }

  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.25s ease;
    max-width: 280px;
  }

  .toast.success { border-color: #3d7a5e; }
  .toast.deleted { border-color: var(--danger); }

  .toast svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
  .toast.success svg { stroke: var(--tag-green-text); }
  .toast.deleted svg { stroke: var(--danger-hover); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 360px;
    max-width: 90vw;
  }

  .modal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
  .modal-body { font-size: 12px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .modal-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .modal-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .modal-btn.confirm-delete { background: rgba(194,64,64,0.15); border-color: var(--danger); color: var(--danger-hover); }
  .modal-btn.confirm-delete:hover { background: rgba(194,64,64,0.3); }

  /* STATUS INDICATOR */
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .status-dot.saved { background: var(--tag-green-text); }
  .status-dot.unsaved { background: var(--tag-amber-text); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="app-logo">
      <svg class="logo-gem" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="14,2 26,10 26,18 14,26 2,18 2,10" fill="#7c6af7" opacity="0.15"/>
        <polygon points="14,2 26,10 14,14" fill="#7c6af7" opacity="0.6"/>
        <polygon points="14,2 2,10 14,14" fill="#9b8bff" opacity="0.8"/>
        <polygon points="2,10 2,18 14,14" fill="#4a3fa0" opacity="0.9"/>
        <polygon points="26,10 26,18 14,14" fill="#6055d0" opacity="0.7"/>
        <polygon points="2,18 14,26 14,14" fill="#534ab7" opacity="0.6"/>
        <polygon points="26,18 14,26 14,14" fill="#3c3489" opacity="0.8"/>
        <polygon points="14,2 26,10 26,18 14,26 2,18 2,10" stroke="#7c6af7" stroke-width="0.8" fill="none"/>
      </svg>
      <div>
        <div class="app-name">Obsidian</div>
        <div class="app-sub">Vault</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
      <input type="text" id="searchInput" placeholder="Search notes..." oninput="filterNotes()" />
    </div>
  </div>

  <div class="sidebar-actions">
    <button class="btn-new" onclick="createNote()">
      <svg viewBox="0 0 16 16"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
      New note
    </button>
  </div>

  <div class="note-count" id="noteCount">0 notes</div>
  <div class="notes-list" id="notesList"></div>
</aside>

<!-- MAIN AREA -->
<main class="editor-area" id="editorArea">
  <!-- Welcome -->
  <div class="welcome-screen" id="welcomeScreen">
    <svg viewBox="0 0 64 64">
      <polygon points="32,4 60,20 60,44 32,60 4,44 4,20" stroke-linejoin="round"/>
      <polygon points="32,4 60,20 32,28" stroke-linejoin="round"/>
      <polygon points="32,4 4,20 32,28" stroke-linejoin="round"/>
      <line x1="32" y1="28" x2="32" y2="60"/>
      <line x1="4" y1="20" x2="32" y2="28"/>
      <line x1="60" y1="20" x2="32" y2="28"/>
    </svg>
    <div class="welcome-title">Your vault is empty</div>
    <div class="welcome-sub">Create a new note to start capturing<br>your thoughts and ideas.</div>
  </div>

  <!-- Editor (hidden initially) -->
  <div id="editorPanel" class="hidden" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
    <div class="editor-toolbar">
      <div class="toolbar-left">
        <select class="tag-select" id="tagSelect" onchange="updateCurrentNoteTag()">
          <option value="">— no tag —</option>
          <option value="ideas">💡 ideas</option>
          <option value="work">💼 work</option>
          <option value="personal">🌿 personal</option>
        </select>
        <div class="word-count" id="wordCount">0 words</div>
      </div>
      <div class="toolbar-right">
        <div class="status-dot" id="statusDot" title="Unsaved"></div>
        <button class="toolbar-btn save" onclick="saveCurrentNote()">
          <svg viewBox="0 0 16 16"><path d="M13 13H3a1 1 0 01-1-1V4l3-2h7l2 2v8a1 1 0 01-1 1z"/><rect x="5" y="8" width="6" height="5"/><rect x="5" y="2" width="4" height="3"/></svg>
          Save
        </button>
        <button class="toolbar-btn danger" onclick="confirmDelete()">
          <svg viewBox="0 0 16 16"><polyline points="2,4 14,4"/><path d="M5 4V2h6v2"/><path d="M5 7v5m3-5v5m3-5v5"/><rect x="3" y="4" width="10" height="9" rx="1"/></svg>
          Delete
        </button>
      </div>
    </div>

    <div class="title-area">
      <input type="text" id="noteTitle" placeholder="Untitled note…" oninput="onEdit()" />
      <div class="title-underline"></div>
    </div>

    <div class="editor-body">
      <textarea id="noteContent" placeholder="Begin writing… markdown and prose welcome." oninput="onEdit()"></textarea>
    </div>
  </div>
</main>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">Delete this note?</div>
    <div class="modal-body" id="deleteModalBody">This action cannot be undone.</div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">Cancel</button>
      <button class="modal-btn confirm-delete" onclick="deleteCurrentNote()">Delete forever</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  let notes = JSON.parse(localStorage.getItem('obsidian_notes') || '[]');
  let activeId = null;
  let saveTimeout = null;

  function save() {
    localStorage.setItem('obsidian_notes', JSON.stringify(notes));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function createNote() {
    const note = {
      id: genId(),
      title: '',
      content: '',
      tag: '',
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    notes.unshift(note);
    save();
    renderList();
    openNote(note.id);
    setTimeout(() => document.getElementById('noteTitle').focus(), 50);
  }

  function openNote(id) {
    activeId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;
    document.getElementById('noteTitle').value = note.title;
    document.getElementById('noteContent').value = note.content;
    document.getElementById('tagSelect').value = note.tag || '';
    updateWordCount();
    setStatus('saved');
    document.getElementById('welcomeScreen').classList.add('hidden');
    document.getElementById('editorPanel').classList.remove('hidden');
    document.getElementById('editorPanel').style.display = 'flex';
    renderList();
  }

  function onEdit() {
    setStatus('unsaved');
    updateWordCount();
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveCurrentNote(true), 2000);
  }

  function saveCurrentNote(auto = false) {
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    if (!note) return;
    note.title = document.getElementById('noteTitle').value.trim() || 'Untitled';
    note.content = document.getElementById('noteContent').value;
    note.tag = document.getElementById('tagSelect').value;
    note.updatedAt = Date.now();
    notes = [note, ...notes.filter(n => n.id !== activeId)];
    save();
    renderList();
    setStatus('saved');
    if (!auto) toast('Note saved', 'success');
  }

  function updateCurrentNoteTag() {
    onEdit();
  }

  function confirmDelete() {
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    const title = note?.title || 'Untitled';
    document.getElementById('deleteModalBody').textContent =
      `"${title}" will be permanently deleted.`;
    document.getElementById('deleteModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('deleteModal').classList.remove('open');
  }

  function deleteCurrentNote() {
    closeModal();
    if (!activeId) return;
    notes = notes.filter(n => n.id !== activeId);
    save();
    activeId = null;
    document.getElementById('editorPanel').classList.add('hidden');
    document.getElementById('welcomeScreen').classList.remove('hidden');
    renderList();
    toast('Note deleted', 'deleted');
  }

  function setStatus(state) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + state;
    dot.title = state === 'saved' ? 'All changes saved' : 'Unsaved changes';
  }

  function updateWordCount() {
    const content = document.getElementById('noteContent').value;
    const words = content.trim() ? content.trim().split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = words + ' word' + (words !== 1 ? 's' : '');
  }

  function filterNotes() {
    renderList();
  }

  function renderList() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = notes.filter(n =>
      n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
    );
    const list = document.getElementById('notesList');
    document.getElementById('noteCount').textContent = filtered.length + ' note' + (filtered.length !== 1 ? 's' : '');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 40 40"><circle cx="20" cy="16" r="9"/><path d="M9 34c0-6 5-10 11-10s11 4 11 10"/></svg>
        <div>No notes found</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(n => {
      const tagClass = n.tag ? 'tag-' + n.tag : '';
      const tagLabel = n.tag || '';
      const preview = n.content.replace(/\n/g, ' ').slice(0, 60);
      return `<div class="note-item ${n.id === activeId ? 'active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-item-title">${n.title || 'Untitled'}</div>
        <div class="note-item-meta">
          <span class="note-item-date">${formatDate(n.updatedAt)}</span>
          ${tagLabel ? `<span class="note-tag ${tagClass}">${tagLabel}</span>` : ''}
        </div>
        ${preview ? `<div class="note-item-preview">${preview}</div>` : ''}
      </div>`;
    }).join('');
  }

  function toast(msg, type = 'success') {
    const icons = {
      success: `<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><polyline points="5,8 7,10 11,6"/></svg>`,
      deleted: `<svg viewBox="0 0 16 16"><polyline points="2,4 14,4"/><path d="M5 4V2h6v2"/><rect x="3" y="4" width="10" height="9" rx="1"/></svg>`,
    };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = (icons[type] || '') + `<span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      saveCurrentNote();
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
      e.preventDefault();
      createNote();
    }
    if (e.key === 'Escape') closeModal();
  });

  // Seed some demo notes if empty
  if (!notes.length) {
    const demos = [
      { title: 'Welcome to Obsidian Notes', content: 'This is your personal vault.\n\nStart capturing ideas, notes, and thoughts. Use tags to organize your notes and search to find anything instantly.\n\nKeyboard shortcuts:\n— Ctrl+S / ⌘S to save\n— Ctrl+N / ⌘N for a new note', tag: 'ideas' },
      { title: 'Meeting notes — Q4 planning', content: 'Discussed roadmap priorities for next quarter.\n\nAction items:\n- Finalize feature list by Friday\n- Schedule design review\n- Update stakeholders\n\nNext meeting: Thursday 2pm', tag: 'work' },
      { title: 'Reading list', content: 'Books to read this month:\n\n1. The Pragmatic Programmer\n2. Deep Work – Cal Newport\n3. Shape Up – Ryan Singer\n\nCurrently reading: The Name of the Wind', tag: 'personal' },
    ];
    demos.forEach((d, i) => {
      const ts = Date.now() - i * 3600000 * 5;
      notes.push({ id: genId(), title: d.title, content: d.content, tag: d.tag, createdAt: ts, updatedAt: ts });
    });
    save();
  }

  renderList();
</script>
</body>
</html>
